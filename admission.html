<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ලියාපදිංචිය සම්පූර්ණයි | Admission Card</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .admission-card {
            background: white;
            width: 100%;
            max-width: 450px;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border-top: 12px solid #27ae60;
            text-align: center;
        }

        .header h2 {
            margin: 5px 0;
            color: #2c3e50;
        }

        .success-tick {
            background: #27ae60;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin: 0 auto 20px;
        }

        .info-grid {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
            border: 1px solid #e9ecef;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #dee2e6;
        }

        .info-row:last-child { border-bottom: none; }

        .label { color: #6c757d; font-weight: 500; }
        .value { color: #212529; font-weight: 700; }

        .id-text { color: #e67e22; font-size: 1.1rem; }
        .secret-text { 
            background: #34495e; 
            color: white; 
            padding: 2px 8px; 
            border-radius: 4px; 
            font-family: monospace;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-print { background: #3498db; color: white; }
        .btn-db { background: #2ecc71; color: white; text-decoration: none; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; }

        @media print {
            .btn-group, .footer-note { display: none; }
            body { background: white; }
            .admission-card { box-shadow: none; border: 2px solid #27ae60; }
        }
    </style>
</head>
<body>

    <div class="admission-card">
        <div class="success-tick">✓</div>
        <div class="header">
            <h2>ලියාපදිංචිය සම්පූර්ණයි!</h2>
            <p style="color: #666;">Admission Successfully Completed</p>
        </div>

        <div class="info-grid">
            <div class="info-row">
                <span class="label">නම (Name)</span>
                <span class="value" id="disp-name">Loading...</span>
            </div>
            <div class="info-row">
                <span class="label">Student ID</span>
                <span class="value id-text" id="disp-id">Loading...</span>
            </div>
            <div class="info-row">
                <span class="label">WhatsApp</span>
                <span class="value" id="disp-whatsapp">Loading...</span>
            </div>
            <div class="info-row">
                <span class="label">Secret Code</span>
                <span class="value secret-text" id="disp-secret">Loading...</span>
            </div>
        </div>

        <p class="footer-note" style="font-size: 0.8rem; color: #95a5a6;">
            මෙම Admission පත්‍රය සුරැකිව තබාගන්න. <br>
            Please save or print this admission card.
        </p>

        <div class="btn-group">
            <button class="btn btn-print" onclick="window.print()">🖨️ Print / PDF</button>
            <a href="login.html" class="btn btn-db"> login</a>
        </div>
    </div>

    <script>
        window.onload = function() {
            // LocalStorage එකෙන් දත්ත ලබා ගැනීම
            let students = JSON.parse(localStorage.getItem('students')) || [];
            
            if (students.length > 0) {
                let lastIndex = students.length - 1;
                let lastStudent = students[lastIndex];

                // 1. WhatsApp අංකය පෙන්වීම
                document.getElementById('disp-whatsapp').innerText = lastStudent.whatsapp;

                // 2. නම පෙන්වීම
                document.getElementById('disp-name').innerText = lastStudent.fname + " " + lastStudent.lname;

                // 3. ID සහ Secret Code එක කලින් නැතිනම් පමණක් සාදන්න
                if (!lastStudent.studentID || lastStudent.studentID === "") {
                    // නව Student ID (STD + Year + Random Number)
                    let studentID = "STD-" + new Date().getFullYear() + "-" + Math.floor(1000 + Math.random() * 9000);
                    // නව Secret Code
                    let secret = Math.random().toString(36).substring(2, 8).toUpperCase();

                    // දත්ත Array එක Update කිරීම
                    lastStudent.studentID = studentID;
                    lastStudent.secretCode = secret;
                    students[lastIndex] = lastStudent;
                    
                    // LocalStorage එකට නැවත Save කිරීම
                    localStorage.setItem('students', JSON.stringify(students));
                }

                // තිරය මත අගයන් පෙන්වීම
                document.getElementById('disp-id').innerText = lastStudent.studentID;
                document.getElementById('disp-secret').innerText = lastStudent.secretCode;

            } else {
                // දත්ත නැතිනම් පණිවිඩයක් පෙන්වීම
                document.querySelector('.admission-card').innerHTML = "<h2>දත්ත හමු නොවීය!</h2><p>කරුණාකර නැවත ලියාපදිංචි වන්න.</p><a href='register.html'>ලියාපදිංචි වන්න</a>";
            }
        };
    </script>

</body>
</html>
